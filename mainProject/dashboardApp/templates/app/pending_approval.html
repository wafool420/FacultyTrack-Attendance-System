<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pending Approval</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f6fa;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
      }

      .pending-card {
        width: 100%;
        max-width: 460px;
        background: #ffffff;
        padding: 35px;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      .pending-icon {
        width: 65px;
        height: 65px;
        background: #fff3cd;
        color: #b8860b;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 18px;
        font-size: 32px;
      }

      h2 {
        margin: 0;
        color: #176b4d;
        font-size: 26px;
      }

      p {
        color: #6c757d;
        line-height: 1.5;
        margin: 14px 0 25px;
        font-size: 15px;
      }

      .logout-btn {
        display: block;
        width: 100%;
        padding: 12px;
        background: #176b4d;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 15px;
      }

      .logout-btn:hover {
        background: #12563d;
      }
    </style>
  </head>

  <body>
    <div class="pending-card">
      <div class="pending-icon">⏳</div>

      <h2>Your account is pending approval.</h2>

      <p>
        Please wait for an administrator to approve your account before
        accessing the system.
      </p>

      <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
    </div>
  </body>
</html>
