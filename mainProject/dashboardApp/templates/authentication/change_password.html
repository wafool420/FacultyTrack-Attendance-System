{% extends "app/base.html" %} {% block content %}

<style>
  .password-card {
    max-width: 450px;
    margin: 60px auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
  }

  .password-card h2 {
    margin-bottom: 5px;
    color: #176b4d;
  }

  .subtitle {
    color: #666;
    margin-bottom: 25px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .form-group input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }

  .btn-save {
    width: 100%;
    padding: 11px;
    background: #176b4d;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-save:hover {
    background: #12563d;
  }

  .error-text {
    margin-top: 6px;
    color: #dc3545;
    font-size: 14px;
    font-weight: 600;
  }
</style>

<div class="password-card">
  <h2>Change Password</h2>
  <p class="subtitle">Enter your old password and choose a new one.</p>

  <form method="POST">
    {% csrf_token %}

    <div class="form-group">
      <label>Old Password</label>
      {{ form.old_password }} {% if form.old_password.errors %}
      <p class="error-text">Old password is incorrect.</p>
      {% endif %}
    </div>

    <div class="form-group">
      <label>New Password</label>
      {{ form.new_password1 }}
    </div>

    <div class="form-group">
      <label>Confirm New Password</label>
      {{ form.new_password2 }}
    </div>

    <button type="submit" class="btn-save">Change Password</button>
  </form>
</div>

{% endblock %}
