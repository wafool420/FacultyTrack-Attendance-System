{% extends "app/base.html" %} {% block content %}

<style>
  .delete-card {
    width: 100%;
    max-width: 430px;
    background: #fff;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    text-align: center;
    margin: 60px auto;
  }

  .warning-icon {
    width: 60px;
    height: 60px;
    background: #ffe8e8;
    color: #b42318;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    font-size: 30px;
    font-weight: 700;
  }

  .delete-card h1 {
    margin: 0;
    color: #b42318;
    font-size: 26px;
  }

  .delete-card p {
    color: #6c757d;
    line-height: 1.5;
    margin: 14px 0 25px;
    font-size: 15px;
  }

  .delete-btn {
    width: 100%;
    padding: 12px;
    background: #b42318;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
    margin-bottom: 12px;
  }

  .delete-btn:hover {
    background: #8f1d14;
  }

  .cancel-link {
    display: block;
    width: 100%;
    padding: 12px;
    background: #eef1f4;
    color: #333;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
  }

  .cancel-link:hover {
    background: #e1e5e9;
  }
</style>

<div class="delete-card">
  <div class="warning-icon">!</div>

  <h1>Delete Account</h1>
  <p>
    Are you sure you want to delete your account? This action cannot be undone.
  </p>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="delete-btn">Yes, delete my account</button>
  </form>

  <a href="{% url 'home' %}" class="cancel-link">Cancel</a>
</div>

{% endblock %}
